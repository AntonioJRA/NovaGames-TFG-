<div *ngIf="!isLoading" class="flex">
  <main class="px-6 pt-6 space-y-6">
    <div class="relative">
      <h1
        class="text-center uppercase font-bold text-xl py-6 bg-primary rounded-t-xl"
      >
        {{ gameData.title }}
      </h1>
      <figure class="max-h-96 w-full bg-black">
        <img
          [src]="'assets/images/covers/' + gameData.cover"
          [alt]="gameData.cover"
          class="max-h-96 w-full object-contain"
        />
      </figure>
      <div
        class="absolute bottom-5 right-5 highlight-text flex items-center justify-center h-[10%] space-x-3 bg-accent py-2 px-4 rounded-xl"
      >
        <img
          src="assets/images/novagames/star.png"
          alt=""
          class="h-full object-contain"
        />
        <p class="text-2xl">{{ gameData.total_rating }}</p>
      </div>
      <div
        class="absolute bottom-5 left-5 highlight-text flex items-center justify-center h-[10%] space-x-3 bg-accent py-2 px-4 rounded-xl"
      >
        <i class="fa-solid fa-chart-line text-2xl text-green-500"></i>
        <p class="text-2xl">{{ gameData.downloads | number : "1.0-2" }}</p>
      </div>
    </div>

    <div *ngIf="sessionToken" class="flex items-center justify-end">
      @if (oldUserRating === -1) {
      <ng-container *ngFor="let star of [1, 2, 3, 4, 5]; let i = index">
        <i
          class="text-3xl cursor-pointer fa-star"
          [ngClass]="{
            'fa-solid': i < rating,
            'fa-regular': i >= rating
          }"
          (click)="setRating(i + 1)"
        ></i>
      </ng-container>

      <button
        (click)="addGameRating()"
        class="text-2xl transition-all ease-in duration-100 bg-blue-700 hover:bg-blue-800 py-2 px-4 rounded-xl ml-5"
      >
        {{ "gameSection.rating.name" | translate }}
      </button>
      } @else {
      <ng-container *ngFor="let star of [1, 2, 3, 4, 5]; let i = index">
        <i
          class="text-3xl cursor-pointer fa-star"
          [ngClass]="{
            'fa-solid': i < oldUserRating,
            'fa-regular': i >= oldUserRating
          }"
          (click)="setNewRating(i + 1)"
        ></i>
      </ng-container>
      <button
        (click)="updateGameRating()"
        class="text-2xl transition-all ease-in duration-100 bg-blue-700 hover:bg-blue-800 py-2 px-4 rounded-xl ml-5"
      >
        {{ "gameSection.updateRating.name" | translate }}
      </button>
      }
    </div>

    <div class="">
      <p class="text-xl">{{ gameData.description }}</p>
    </div>

    <div
      class="flex flex-col space-y-5 lg:flex-row lg:space-y-0"
      *ngIf="contentBlockData"
    >
      @for (block of contentBlockData; track $index) {
      <div class="grid grid-cols-2 mx-5 lg:grid-cols-1 lg:grid-rows-2">
        <figure
          class="w-full h-40 overflow-hidden bg-black self-center lg:self-start"
          [ngClass]="($index + 1) % 2 === 0 ? 'order-2 lg:order-1' : 'order-1 '"
        >
          <img
            [src]="'assets/images/content_blocks/' + block.image_name"
            [alt]="block.image_name"
            class="w-full h-full object-contain"
          />
        </figure>
        <small
          class="italic text-center p-4 self-center lg:self-start"
          [ngClass]="($index + 1) % 2 === 0 ? 'order-1' : 'order-2'"
        >
          {{ block.content }}
        </small>
      </div>
      }
    </div>
  </main>

  <!-- POSTS -->
  <!-- <aside class="hidden lg:block space-y-5 bg-primary py-6 px-6">
    @for (post of postsData; track $index) {
    <div
      class="bg-accent w-44 h-44 cursor-pointer relative"
      [routerLink]="'/post/' + post.id"
    >
      <p class="">{{ post.id }}. {{ post.title }}</p>
      <p class="absolute right-0 bottom-0 p-2">{{ post.post_date | date }}</p>
    </div>
    }
  </aside> -->
</div>

<!-- DOWNLOAD URL -->
<div *ngIf="!isLoading" class="flex items-center justify-center mt-6">
  <a
    (click)="updateGameDownloads()"
    [href]="gameData.download_url"
    target="_blank"
    rel="noopener noreferrer"
    class="block transition-all ease-in duration-100 text-center text-4xl uppercase bg-red-700 hover:bg-red-800 font-bold py-2 rounded-2xl w-full max-w-[50rem]"
  >
    {{ "gameSection.downloadURL" | translate }}
    <i class="fa-solid fa-cloud-arrow-down"></i
  ></a>
</div>
